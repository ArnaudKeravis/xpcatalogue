id: "exp-template-001"
title: "Short descriptive title"
owner: "team-or-person"
created_at: "2026-03-24"
updated_at: "2026-03-24"

lifecycle:
  status: "draft" # draft | validated | deprecated
  version: "0.1.0"
  last_reviewed: "2026-03-24"

tags:
  - "domain:general"
  - "model:claude"
  - "task:example"

goal:
  problem: "What pain point this solves."
  success_definition: "How you know this experience worked."

context:
  when_to_use:
    - "Condition or trigger #1"
    - "Condition or trigger #2"
  when_not_to_use:
    - "Condition where this should not be used"

inputs:
  required:
    - name: "source_text"
      description: "Main user content to process"
      format: "string"
      example: "Paste source text here."
  optional:
    - name: "tone"
      description: "Desired tone"
      format: "enum[friendly,formal,concise]"
      default: "concise"

workflow:
  system_prompt: |
    You are an expert assistant.
    Follow instructions strictly and be explicit about uncertainty.
  user_prompt_template: |
    Task:
    {{task}}

    Input:
    {{source_text}}

    Constraints:
    - Keep output concise
    - Respect requested tone: {{tone}}
  steps:
    - "Collect and verify all required inputs"
    - "Run prompt with provided context"
    - "Review output against quality checks"
  human_in_the_loop:
    required: true
    review_points:
      - "Factual correctness"
      - "Tone appropriateness"
      - "Sensitive data leakage"

output:
  format: "markdown"
  schema_hint:
    sections:
      - "Summary"
      - "Main content"
      - "Risks or caveats"
  quality_criteria:
    - "No fabricated facts"
    - "Actionable and clear"
    - "Matches requested format exactly"

risks:
  failure_modes:
    - "Hallucinated details"
    - "Missing context from inputs"
  mitigations:
    - "Add source-only constraint in prompt"
    - "Require reviewer sign-off for external sharing"

metrics:
  kpis:
    - name: "time_saved_minutes"
      description: "Estimated time saved per run"
      target: ">= 15"
    - name: "acceptance_rate"
      description: "Outputs accepted without major edits"
      target: ">= 70%"

examples:
  - input:
      task: "Summarize a long meeting note"
      source_text: "Meeting discussed roadmap priorities and risks..."
      tone: "concise"
    output: |
      ## Summary
      The team aligned on top priorities for next quarter.

      ## Main content
      - Priority 1: Stabilize onboarding funnel
      - Priority 2: Reduce support backlog by 30%

      ## Risks or caveats
      - Timeline depends on hiring plan confirmation.
