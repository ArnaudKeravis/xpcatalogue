id: exp-claude-release-notes-summary
title: Summarize technical release notes for customer communication
owner: Product Marketing
tags:
  - claude
  - release-notes
  - customer-comms
model:
  provider: anthropic
  name: claude
version: "1.0.0"
lifecycle:
  status: validated
  created_at: 2026-03-24
  last_reviewed: 2026-03-24
goal:
  problem: Engineers write release notes for internal use, but customers need short, outcome-focused updates.
  outcome: Convert raw release notes into customer-friendly highlights with clear user impact.
  kpis:
    - Reduce publishing time for release announcements by 40%.
    - Maintain less than 5% factual correction rate after review.
inputs:
  required:
    - Internal release notes in markdown
    - Product names and feature flags
  optional:
    - Priority customer segments
    - Preferred communication tone guide
prompt:
  system: >
    You are a product communication specialist. Convert technical release notes into concise,
    customer-safe release highlights. Do not invent details.
  user_template: |
    Summarize the following release notes.

    Constraints:
    - Audience: external customers
    - Length: 120-180 words
    - Tone: confident, clear, non-technical
    - Include 3 sections: "What's new", "Why it matters", "Actions for customers"
    - Exclude internal codenames and any confidential details

    Release notes:
    {{release_notes_markdown}}
workflow:
  steps:
    - Collect release notes and remove confidential sections before prompting.
    - Run the prompt using the current release notes.
    - Perform human review for factual accuracy and policy compliance.
    - Publish to the customer changelog and email digest.
  human_in_the_loop: true
output:
  format: markdown
  acceptance_criteria:
    - Summary is aligned with source notes and has no invented claims.
    - Language is understandable by non-technical users.
    - Exactly 3 required sections are present.
example:
  input_excerpt: |
    Added role-based access control for dashboards.
    Improved export speed by 30% for CSV reports.
    Fixed race condition in webhook retries.
  output_excerpt: |
    ## What's new
    You can now manage dashboard access using role-based permissions, export CSV reports faster,
    and rely on improved webhook stability.

    ## Why it matters
    These updates make collaboration safer, reporting faster, and integrations more reliable.

    ## Actions for customers
    Review dashboard roles, test exports on your largest reports, and confirm webhook endpoint monitoring.
risks:
  failure_modes:
    - Exposing confidential implementation details.
    - Over-promising feature behavior not in the release.
  mitigations:
    - Pre-redact release notes.
    - Mandatory reviewer approval before publication.
